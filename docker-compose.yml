version: "3.9"

services:
  etl:
    build: .
    container_name: etl-pipeline
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: etl-postgres
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: etl
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
